<!DOCTYPE html>
<html>
<head>
    <title>DevOps Project - Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="social-links">
            <a href="https://linkedin.com" target="_blank">LinkedIn</a>
            <a href="https://instagram.com" target="_blank">Insta</a>
            <a href="https://youtube.com" target="_blank">YouTube</a>
        </div>
        <h2>Login</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>No account? <a href="register.html">Register here</a></p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            const res = await fetch('http://47.130.213.157:5001/api/users/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('user', data.user.fullname);
                window.location.href = 'dashboard.html';
            } else {
                alert(data.message || 'Login failed!');
            }
        };
    </script>
</body>
</html>
